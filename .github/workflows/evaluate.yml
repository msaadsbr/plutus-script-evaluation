name: "Evaluate mainnet scripts"

on:
  schedule:
    - cron: "0 0 * * 6" # Run every Saturday at midnight

  workflow_dispatch:
    inputs:
      plutusRepo:
        description: "Plutus repository (owner/repo format)"
        required: false
        default: "IntersectMBO/plutus"
      plutusBranch:
        description: "Plutus branch to evaluate"
        required: false
        default: "master"
      startFrom:
        description: Start evaluation from a record with specified primary key
        required: false
        default: "0"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest      # ← changed from [plutus-node, self-hosted]
    timeout-minutes: 1440
    steps:
      - name: Checkout this Repo
        uses: actions/checkout@v4.3.0

      - name: Install Nix                    # ← ADD THIS
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Add plutus SRP to the cabal.project   # ← KEEP EXACTLY AS-IS
        id: update_cabal_project
        working-directory: run-script-evaluations
        run: |
          NIX_PATH="nixpkgs=channel:nixos-unstable" \
            nix-shell -p nix-prefetch-git --run \
            "./add_srp.sh --repo '${{ github.event.inputs.plutusRepo || 'IntersectMBO/plutus' }}' --branch '${{ github.event.inputs.plutusBranch || 'master' }}'"

      - name: Verify injection              # ← ADD THIS to confirm
        if: always()
        run: |
          ls /tmp/bbp_injection_* 2>/dev/null && echo "INJECTION CONFIRMED" || echo "no injection file found"

